version: '3.8'

services:
  wwn-charactersheet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wwn-charactersheet
    ports:
      - "5000:5000"
    volumes:
      - wwn-data:/data
    environment:
      ASPNETCORE_URLS: http://+:5000

volumes:
  wwn-data:
    driver: local
