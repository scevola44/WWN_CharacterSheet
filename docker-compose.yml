services:
  wwn-charactersheet:
    # Pull published image from GitHub Container Registry
    image: ghcr.io/scevola44/wwn_charactersheet:${IMAGE_TAG:-latest}
    # To build from source instead, replace the 'image' line above with:
    #   build:
    #     context: .
    #     dockerfile: Dockerfile
    container_name: wwn-charactersheet
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/db
    environment:
      ASPNETCORE_HTTP_PORTS: "5000"
      ConnectionStrings__Default: "Data Source=/app/db/wwn_characters.db"
      DataProtection__KeysPath: /app/db/keys
      # Branch name for informational/documentation purposes
      # Set this to match the branch you have checked out locally
      # Example: BRANCH=main or BRANCH=develop
      BRANCH: ${BRANCH:-main}
      # Comma-separated admin email addresses (see .env.example)
      AdminEmails: ${AdminEmails:-}
