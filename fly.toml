# fly.toml app configuration file generated for wwn-charactersheet on 2026-03-20T15:28:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wwn-charactersheet'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = 'wwn_data'
  destination = '/app'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
