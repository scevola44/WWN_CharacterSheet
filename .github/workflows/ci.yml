name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Create beta release
        if: github.ref == 'refs/heads/develop'
        run: |
          gh release create "beta-${{ github.run_number }}" \
            --title "Beta #${{ github.run_number }}" \
            --generate-notes \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create stable release
        if: github.ref == 'refs/heads/main'
        run: |
          gh release create "stable-${{ github.run_number }}" \
            --title "Stable #${{ github.run_number }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend (Vite + TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/WWN.Web/client-app
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Setup Node
        uses: actions/setup-node@v4.0.3
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/WWN.Web/client-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (typecheck + bundle)
        run: npm run build
